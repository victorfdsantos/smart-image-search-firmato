[general]
# Pasta de entrada das imagens originais
landing_path = ./landing 
# Pasta de saída dos JSONs por produto
data_path = ./data
# Pasta dos logs
logs_path = ./logs

[image]
# Dimensões de resize (largura x altura). 0 = manter proporção
resize_width = 1200
resize_height = 1200
# Qualidade do JPEG final (0-95)
jpeg_quality = 85
# Extensões aceitas (separadas por vírgula)
allowed_extensions = .jpg,.jpeg,.png,.tif,.tiff,.webp

[nas]
# Caminho base do NAS (ajuste para o caminho de montagem real)
base_path = ./output/nas
# Subpasta organizacional dentro do NAS
# Colunas do Excel separadas por "/" que formam o caminho de pastas
organizer_columns = Marca,Linha_Colecao,Categoria_Principal

[gcs]
# Nome do bucket GCS
bucket_name = firmato-moveis-catalog
# Caminho do arquivo de credenciais do GCS (JSON de service account)
credentials_path = ./config/gcs_credentials.json
# Prefixo interno dentro do bucket
bucket_prefix = products
# Colunas organizadoras para o caminho dentro do bucket (mesmo padrão do NAS)
organizer_columns = Marca,Linha_Colecao,Categoria_Principal

[hash]
# Colunas usadas para gerar o SHA256 da chave_especial (separadas por vírgula)
hash_columns = Id_produto,Nome_Produto,Marca,Categoria_Principal,Subcategoria,Tipo
