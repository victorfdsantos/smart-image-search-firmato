map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name firmato.local localhost;

    # ----------------------------------------------------------------
    # API Backend — /api/* → backend:8000 (strip do prefixo /api)
    # ----------------------------------------------------------------
    location /backend/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        client_max_body_size 50M;
    }

    # ----------------------------------------------------------------
    # AI Service — /ai/* → ai:9000 (strip do prefixo /ai)
    # Útil para chamar pelo nginx em vez de bater direto na porta 9000.
    # Em dev você pode ignorar isso e bater direto em localhost:9000.
    # ----------------------------------------------------------------
    location /ai/ {
        proxy_pass http://ai:9000/;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout  600s;   # retreinamento pode demorar
        proxy_send_timeout  600s;
        client_max_body_size 10M;
    }

    # ----------------------------------------------------------------
    # Frontend Next.js — tudo o mais → frontend:3000
    # ----------------------------------------------------------------
    location / {
        proxy_pass          http://frontend:3000;
        proxy_http_version  1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_buffering     off;
    }
}