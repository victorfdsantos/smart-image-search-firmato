services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: firmato-catalog-api:latest
    container_name: firmato-api
    restart: unless-stopped
    ports:
      - "8000:8000"

    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/.cache/huggingface
      - CORS_ORIGINS=http://localhost:3000,http://firmato.local,http://192.168.18.14

    volumes:
      - ./src/config.ini:/app/src/config.ini:ro
      - ./src/config:/app/src/config
      - ./nas/landing:/app/src/nas/landing
      - ./nas/data:/app/src/nas/data
      - ./nas/output:/app/src/nas/output
      - ./nas/embeddings:/app/src/nas/embeddings
      - ./nas/logs:/app/src/nas/logs
      - clip_cache:/app/.cache/huggingface

    tmpfs:
      - /app/src/tmp_images:size=512m,uid=1000,gid=1000
      - /app/src/tmp_uploads:size=256m,uid=1000,gid=1000

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

    networks:
      - firmato-net

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  clip_cache:
    driver: local

networks:
  firmato-net:
    name: firmato-net
    driver: bridge