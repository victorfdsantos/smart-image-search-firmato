services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    image: firmato-backend:latest
    container_name: firmato-backend
    restart: unless-stopped
    ports:
      - "8000:8000"   # acessível em localhost:8000 (Insomnia / curl direto)
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/.cache/huggingface
      - CORS_ORIGINS=http://localhost,http://firmato.local
      - SHAREPOINT_CLIENT_SECRET=${SHAREPOINT_CLIENT_SECRET}
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
    volumes:
      - ./backend/src/config.ini:/app/src/config.ini:ro
      - ./backend/src/config:/app/src/config
      - ./nas/landing:/app/src/nas/landing
      - ./nas/data:/app/src/nas/data
      - ./nas/output:/app/src/nas/output
      - ./nas/thumbnail:/app/src/nas/thumbnail
      - ./nas/utils:/app/src/nas/utils
      - ./nas/embeddings:/app/src/nas/embeddings
      - ./nas/logs:/app/src/nas/logs
      - clip_cache:/app/.cache/huggingface
    tmpfs:
      - /app/src/tmp_images:size=512m,uid=1000,gid=1000
      - /app/src/tmp_uploads:size=256m,uid=1000,gid=1000
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    networks:
      - firmato-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # AI Service — indexação e retreinamento incremental de embeddings
  # ---------------------------------------------------------------------------
  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    image: firmato-ai:latest
    container_name: firmato-ai
    restart: unless-stopped
    ports:
      - "9000:9000"   # acessível em localhost:9000 (Insomnia / curl direto)
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/.cache/huggingface
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
    volumes:
      - ./ai/src/config.ini:/app/src/config.ini:ro
      - ./nas/data:/app/nas/data
      - ./nas/output:/app/nas/output
      - ./nas/embeddings:/app/nas/embeddings
      - ./nas/logs:/app/nas/logs
      - clip_cache:/app/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G
    networks:
      - firmato-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: firmato-frontend:latest
    container_name: firmato-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"   # acessível direto em localhost:3000 além do nginx :80
    environment:
      - NODE_ENV=production
      - API_BASE=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - firmato-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: firmato-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/firmato.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - firmato-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  clip_cache:
    driver: local

networks:
  firmato-net:
    name: firmato-net
    driver: bridge