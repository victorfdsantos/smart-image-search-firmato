services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    image: firmato-backend:latest
    container_name: firmato-backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/.cache/huggingface
      - CORS_ORIGINS=http://localhost,http://firmato.local
    volumes:
      - ./backend/src/config.ini:/app/src/config.ini:ro
      - ./backend/src/config:/app/src/config
      - ./nas/landing:/app/src/nas/landing
      - ./nas/data:/app/src/nas/data
      - ./nas/output:/app/src/nas/output
      - ./nas/embeddings:/app/src/nas/embeddings
      - ./nas/logs:/app/src/nas/logs
      - clip_cache:/app/.cache/huggingface
    tmpfs:
      - /app/src/tmp_images:size=512m,uid=1000,gid=1000
      - /app/src/tmp_uploads:size=256m,uid=1000,gid=1000
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    networks:
      - firmato-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: firmato-frontend:latest
    container_name: firmato-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      # Next.js rewrite usa /api/* → nginx → backend, então API_BASE aponta pro nginx
      - API_BASE=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - firmato-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: firmato-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/firmato.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - firmato-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  clip_cache:
    driver: local

networks:
  firmato-net:
    name: firmato-net
    driver: bridge